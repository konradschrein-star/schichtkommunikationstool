<!DOCTYPE html>

<html class="light" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "surface-container-highest": "#e2e2e2",
                    "surface-dim": "#dadada",
                    "outline-variant": "#c6c6c6",
                    "outline": "#777777",

                    "tertiary-fixed": "#5e5e5e",
                    "secondary": "#5e5e5e",
                    "surface-container": "#eeeeee",
                    "on-background": "#1b1b1b",

                    "tertiary-fixed-dim": "#474747",
                    "inverse-surface": "#303030",
                    "on-error": "#ffffff",
                    "on-surface-variant": "#474747",

                    "tertiary-container": "#747474",
                    "surface-container-high": "#e8e8e8",
                    "on-surface": "#1b1b1b",
                    "on-secondary-container": "#1b1b1b",
                    "background": "#f9f9f9",
                    "inverse-on-surface": "#f1f1f1",

            "borderRadius": {

                    "xl": "1.5rem",
                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .text-success { color: #15803d; }
        .bg-success-subtle { background-color: rgba(21, 128, 61, 0.1); }
        .waveform-bar {
            width: 3px;
            background-color: currentColor;
            border-radius: 99px;
            margin: 0 1px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col selection:bg-primary selection:text-white">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-[#f9f9f9] dark:bg-zinc-950 z-50">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="professional headshot of a smiling middle-aged man in a clean work uniform with a soft grey studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQix01j-Ev-TTCCvd-NGpU-zoumm2W317tlCzG8jNkJbFUIJVVFZvy2EZS3zO2ntMBK5DHylI3YSAXrCUX6hsPlWi_lpkkELsGkTGm1yfZ7cMEKJBBWgnOlO3siNhGQrcFutCL18Ff7JVMDhg0F3mLWf1DfT5nw8FkVFhIjv-MAdhG2g1V5a6N39cMuAWYdH72zyd0L584IpcR-yhFvrbx0ybd0kSKWjhOEYMAwlKwZh-CEuu5riUE-Vyy0-SRRiyaoYDQptvrPCXG"/>
</div>
<h1 class="font-inter font-semibold tracking-tight text-lg text-black dark:text-white">Hallo Piotr</h1>
</div>
<button class="p-2 rounded-lg hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-black dark:text-white" data-icon="logout">logout</span>
</button>
</div>
<div class="h-[1px] bg-[#f3f3f3] dark:bg-zinc-900 w-full"></div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col px-6 pt-4 pb-32 gap-6 max-w-xl mx-auto w-full">
<!-- Action Tiles (approx 60% of viewport height) -->
<div class="flex flex-col gap-4 h-[486px]">
<!-- Success Green Button -->
<button class="flex-1 w-full bg-success-subtle rounded-lg flex flex-col items-center justify-center gap-6 group active:scale-[0.98] transition-all duration-200 border-2 border-transparent hover:border-green-600/20">
<div class="p-8 rounded-full bg-[#15803d] text-white shadow-xl shadow-green-900/10 flex items-center justify-center">
<span class="material-symbols-outlined !text-5xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="text-center">
<span class="block text-success font-bold text-xl tracking-tight">Sprachnotiz aufnehmen</span>
<!-- Simulated pulsating waveform -->
<div class="flex items-center justify-center h-4 mt-3 text-success/40">
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-2"></div>
</div>
</div>
</button>
<!-- White/Gray Outline Button -->
<button class="flex-1 w-full bg-surface-container-lowest rounded-lg border-2 border-surface-container-highest flex flex-col items-center justify-center gap-4 active:scale-[0.98] transition-all duration-200 hover:bg-surface-container-low shadow-sm">
<div class="p-6 rounded-full bg-surface-container-low text-on-surface flex items-center justify-center">
<span class="material-symbols-outlined !text-4xl" data-icon="photo_camera">photo_camera</span>
</div>
<span class="font-semibold text-lg tracking-tight text-on-surface-variant">Foto / Datei hochladen</span>
</button>
</div>
<!-- QA Feed Area -->
<section class="mt-4 flex flex-col gap-4">
<div class="flex items-center justify-between">
<h2 class="label-md text-zinc-400 uppercase tracking-widest text-[11px] font-bold">QA-Feed</h2>
<span class="material-symbols-outlined text-zinc-300" data-icon="unfold_more">unfold_more</span>
</div>
<div class="bg-surface-container-low rounded-lg p-6 relative overflow-hidden">
<!-- AI Indicator -->
<div class="flex items-center gap-2 mb-3">
<div class="w-5 h-5 rounded-md bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<span class="text-[11px] font-bold uppercase tracking-wider text-zinc-500">Bau-Assistent</span>
</div>
<p class="text-2xl font-semibold leading-snug text-on-surface tracking-tight">
                    Fehlen noch Angaben zum Abwasserrohr?
                </p>
<div class="mt-6 flex gap-3">
<button class="flex-1 bg-primary text-white py-3 rounded-lg font-bold text-sm active:scale-95 transition-transform">Ja, ergänzen</button>
<button class="flex-1 bg-surface-container-highest text-on-surface py-3 rounded-lg font-bold text-sm active:scale-95 transition-transform">Später</button>
</div>
<!-- Subtle background decoration -->
<div class="absolute -right-4 -bottom-4 opacity-5 pointer-events-none">
<span class="material-symbols-outlined !text-[120px]" data-icon="chat_bubble">chat_bubble</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-[#f9f9f9]/80 dark:bg-zinc-950/80 backdrop-blur-xl z-50 border-t border-zinc-200/15 dark:border-zinc-800/15 shadow-2xl dark:shadow-none">
<a class="flex flex-col items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-xl p-2.5 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="assignment" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">Tasks</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 p-2.5 hover:bg-zinc-100 dark:hover:bg-zinc-900 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">Voice</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 p-2.5 hover:bg-zinc-100 dark:hover:bg-zinc-900 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="folder">folder</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">Files</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 p-2.5 hover:bg-zinc-100 dark:hover:bg-zinc-900 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase mt-1">QA</span>
</a>
</nav>
</body></html>
