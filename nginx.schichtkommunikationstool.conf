# NGINX Config für schichtkommunikationstool.schreinercontentsystems.com
# Ersetzt die bestehende Config in /etc/nginx/sites-available/
#
# Installation:
#   sudo cp nginx.schichtkommunikationstool.conf /etc/nginx/sites-available/schichtkommunikationstool.schreinercontentsystems.com
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    server_name schichtkommunikationstool.schreinercontentsystems.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy zu Next.js auf Port 3069
    location / {
        proxy_pass http://127.0.0.1:3069;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Audio-Uploads (max 50MB)
        client_max_body_size 50M;
    }

    # SSL Configuration
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/schichtkommunikationstool.schreinercontentsystems.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schichtkommunikationstool.schreinercontentsystems.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP zu HTTPS Redirect
server {
    listen 80;
    server_name schichtkommunikationstool.schreinercontentsystems.com;

    # Let's Encrypt ACME challenge (HTTP muss erreichbar bleiben)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alle anderen Requests zu HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
